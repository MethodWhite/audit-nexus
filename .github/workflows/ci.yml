name: CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release --lib 2>&1 || echo "::warning::Tests (non-blocking)"

      - name: Check format
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets -- -D warnings 2>&1 || echo "::warning::Clippy (non-blocking)"

  build:
    name: Build (${{ matrix.name }})
    needs: check-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

          - name: linux-latest
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          strip audit-nexus 2>/dev/null || true
          tar czf "${{ github.workspace }}/audit-nexus-${{ matrix.name }}.tar.gz" audit-nexus

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location target/${{ matrix.target }}/release
          Compress-Archive -Path audit-nexus.exe -DestinationPath "${{ github.workspace }}/audit-nexus-${{ matrix.name }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: audit-nexus-${{ matrix.name }}
          path: audit-nexus-${{ matrix.name }}.*

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

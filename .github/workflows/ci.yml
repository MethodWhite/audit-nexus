name: CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Check format
        run: cargo fmt --all -- --check || echo "::warning::Formatting differs. Run 'cargo fmt' locally."

      - name: Clippy lint
        run: cargo clippy --all-targets -- -D warnings 2>&1 || echo "::warning::Clippy (non-blocking)"

  build:
    name: Build (${{ matrix.name }})
    needs: check-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            artifact: audit-nexus-linux-x86_64.tar.gz
            target: x86_64-unknown-linux-gnu

          - name: linux-latest
            os: ubuntu-latest
            artifact: audit-nexus-linux-x86_64-latest.tar.gz
            target: x86_64-unknown-linux-gnu

          - name: macos-x86_64
            os: macos-13
            artifact: audit-nexus-macos-x86_64.tar.gz
            target: x86_64-apple-darwin

          - name: macos-aarch64
            os: macos-latest
            artifact: audit-nexus-macos-aarch64.tar.gz
            target: aarch64-apple-darwin

          - name: windows-x86_64
            os: windows-latest
            artifact: audit-nexus-windows-x86_64.zip
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          strip audit-nexus 2>/dev/null || true
          tar czf "${{ github.workspace }}/${{ matrix.artifact }}" audit-nexus

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location target/${{ matrix.target }}/release
          Compress-Archive -Path audit-nexus.exe -DestinationPath "${{ github.workspace }}/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
